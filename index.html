<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Unit Converter</title>
    <style>
        :root {
            --primary-color: #4a6fa5;
            --secondary-color: #166088;
            --background-color: #f4f7f6;
            --card-color: #ffffff;
            --text-color: #333333;
            --border-color: #dddddd;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--background-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .converter-container {
            background-color: var(--card-color);
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
            padding: 30px;
        }

        h1 {
            text-align: center;
            color: var(--secondary-color);
            margin-bottom: 25px;
            font-size: 1.8rem;
        }

        .category-select {
            margin-bottom: 25px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #555;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        select, input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 1rem;
            background-color: #fafafa;
            transition: all 0.3s ease;
        }

        select:focus, input:focus {
            outline: none;
            border-color: var(--primary-color);
            background-color: #fff;
            box-shadow: 0 0 0 3px rgba(74, 111, 165, 0.15);
        }

        .grid-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .result-box {
            background-color: #edf2f7;
            border-left: 5px solid var(--primary-color);
            padding: 15px;
            border-radius: 4px;
            margin-top: 25px;
            text-align: center;
        }

        .result-box p {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 5px;
        }

        .result-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--secondary-color);
            word-break: break-all;
        }
    </style>
</head>
<body>

    <div class="converter-container">
        <h1>Unit Converter</h1>

        <div class="category-select">
            <label for="category">Measurement Category</label>
            <select id="category">
                <option value="length">Length</option>
                <option value="weight">Weight / Mass</option>
                <option value="temperature">Temperature</option>
            </select>
        </div>

        <div class="input-group">
            <label for="inputValue">Value to Convert</label>
            <input type="number" id="inputValue" value="1" placeholder="Enter number...">
        </div>

        <div class="grid-inputs">
            <div>
                <label for="fromUnit">From</label>
                <select id="fromUnit"></select>
            </div>
            <div>
                <label for="toUnit">To</label>
                <select id="toUnit"></select>
            </div>
        </div>

        <div class="result-box">
            <p>Converted Output</p>
            <div class="result-value" id="resultOutput">1 mm = 1 mm</div>
        </div>
    </div>

    <script>
        // Define operational structural data models for unit conversions
        // Base Unit for Length: Meter (m)
        // Base Unit for Weight: Gram (g)
        const unitData = {
            length: {
                units: ["millimeter", "centimeter", "meter", "kilometer", "inch", "foot", "yard", "mile"],
                factors: {
                    millimeter: 0.001,
                    centimeter: 0.01,
                    meter: 1.0,
                    kilometer: 1000.0,
                    inch: 0.0254,
                    foot: 0.3048,
                    yard: 0.9144,
                    mile: 1609.344
                }
            },
            weight: {
                units: ["milligram", "gram", "kilogram", "ounce", "pound"],
                factors: {
                    milligram: 0.001,
                    gram: 1.0,
                    kilogram: 1000.0,
                    ounce: 28.349523125,
                    pound: 453.59237
                }
            },
            temperature: {
                units: ["Celsius", "Fahrenheit", "Kelvin"]
            }
        };

        // DOM Element bindings
        const categorySelect = document.getElementById('category');
        const inputValue = document.getElementById('inputValue');
        const fromUnitSelect = document.getElementById('fromUnit');
        const toUnitSelect = document.getElementById('toUnit');
        const resultOutput = document.getElementById('resultOutput');

        // Dynamically update dropdowns when category switches
        function populateUnits() {
            const category = categorySelect.value;
            const units = unitData[category].units;
            
            // Clear existing elements safely
            fromUnitSelect.innerHTML = '';
            toUnitSelect.innerHTML = '';

            units.forEach((unit, index) => {
                let opt1 = document.createElement('option');
                let opt2 = document.createElement('option');
                opt1.value = unit;
                opt1.textContent = unit;
                opt2.value = unit;
                opt2.textContent = unit;

                // Simple UX enhancement: select different options by default
                if(index === 0) opt1.selected = true;
                if(index === 1 || (units.length === 1 && index === 0)) opt2.selected = true;

                fromUnitSelect.appendChild(opt1);
                toUnitSelect.appendChild(opt2);
            });

            performConversion();
        }

        // Processing Logic calculations Engine
        function performConversion() {
            const category = categorySelect.value;
            const fromUnit = fromUnitSelect.value;
            const toUnit = toUnitSelect.value;
            const val = parseFloat(inputValue.value);

            // Handle invalid/empty text field gracefully
            if (isNaN(val)) {
                resultOutput.textContent = "Please enter a valid numeric input.";
                return;
            }

            let result;

            if (category === 'temperature') {
                result = convertTemperature(val, fromUnit, toUnit);
            } else {
                // Standard linear conversion using Base Ratios
                const factors = unitData[category].factors;
                const valueInBase = val * factors[fromUnit]; // Convert current selection up to baseline scale
                result = valueInBase / factors[toUnit];      // Convert baseline scale over to targeted scale
            }

            // Clean up visual presentation rounding to maximum of 6 decimal spaces without appending trailing zeros
            const displayVal = Number(result.toFixed(6));
            resultOutput.textContent = `${val} ${fromUnit} = ${displayVal} ${toUnit}`;
        }

        // Distinct structural handling for non-linear Temperature equations
        function convertTemperature(value, from, to) {
            if (from === to) return value;
            
            let celsius;

            // Step 1: Normalize everything into base scale (Celsius)
            if (from === "Celsius") {
                celsius = value;
            } else if (from === "Fahrenheit") {
                celsius = (value - 32) * 5 / 9;
            } else if (from === "Kelvin") {
                celsius = value - 273.15;
            }

            // Step 2: Extract base scale back out into target scale representation
            if (to === "Celsius") {
                return celsius;
            } else if (to === "Fahrenheit") {
                return (celsius * 9 / 5) + 32;
            } else if (to === "Kelvin") {
                return celsius + 273.15;
            }
        }

        // Add event listeners to automate real-time responsive updates
        categorySelect.addEventListener('change', populateUnits);
        inputValue.addEventListener('input', performConversion);
        fromUnitSelect.addEventListener('change', performConversion);
        toUnitSelect.addEventListener('change', performConversion);

        // Run setup immediately on window instantiation
        populateUnits();
    </script>
</body>
</html>
